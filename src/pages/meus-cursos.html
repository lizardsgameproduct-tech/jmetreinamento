<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meus Cursos — JMR Tecnologia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #000000;
      --surface-1: #0D0D0D;
      --surface-2: #111827;
      --border: #1F2937;
      --green: #00FF41;
      --green-hover: #00CC33;
      --text-primary: #F9FAFB;
      --text-secondary: #D1D5DB;
      --text-muted: #9CA3AF;
      --text-faint: #6B7280;
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }
    html { -webkit-font-smoothing: antialiased; }
    body { 
      font-family: var(--font-body); 
      background: var(--black); 
      color: var(--text-primary); 
      min-height: 100vh;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
    .title { font-family: var(--font-display); font-size: 32px; font-weight: 700; margin-bottom: 32px; }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
    
    .card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      transition: all 0.3s;
    }
    
    .card:hover {
      border-color: var(--green);
      box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
    }
    
    .card-icon { font-size: 32px; margin-bottom: 12px; }
    .card-title { font-family: var(--font-display); font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .card-desc { font-size: 14px; color: var(--text-muted); line-height: 1.6; margin-bottom: 16px; }
    
    .card-action {
      display: inline-block;
      background: var(--green);
      color: #000;
      padding: 8px 16px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.2s;
      border: none;
      cursor: pointer;
      width: 100%;
      text-align: center;
    }
    
    .card-action:hover { background: var(--green-hover); }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.9);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .modal.active { display: flex; }
    
    .modal-content {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      max-width: 500px;
      width: 100%;
      position: relative;
    }
    
    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 24px;
      cursor: pointer;
      transition: color 0.2s;
      line-height: 1;
    }
    
    .modal-close:hover { color: var(--text-primary); }
    
    .modal-title { font-family: var(--font-display); font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .modal-subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }
    
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; }
    .form-input {
      width: 100%;
      padding: 12px;
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 14px;
    }
    .form-input:focus { outline: none; border-color: var(--green); }
    .form-input[readonly] { opacity: 0.6; cursor: not-allowed; }
    
    .modal-actions { margin-top: 24px; }
    .btn-full { width: 100%; padding: 14px; font-size: 15px; }

    .progress-section {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-top: 40px;
    }
    
    .section-title { font-family: var(--font-display); font-size: 20px; font-weight: 700; margin-bottom: 20px; }
    
    .progress-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      background: var(--surface-1);
      border-radius: 8px;
      margin-bottom: 12px;
    }
    
    .progress-item-name { font-weight: 600; }
    .progress-item-bar {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      margin: 0 16px;
      overflow: hidden;
    }
    
    .progress-item-fill {
      height: 100%;
      background: var(--green);
      transition: width 0.3s;
    }
    
    .progress-item-percent { font-size: 13px; color: var(--text-muted); min-width: 40px; text-align: right; }
    
    .spinner { 
      width: 20px; 
      height: 20px; 
      border: 2px solid var(--border); 
      border-top-color: var(--green); 
      border-radius: 50%; 
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">Meus Cursos</h1>
    
    <div class="grid">
      <div class="card">
        <div class="card-icon">📚</div>
        <h3 class="card-title">Treinamento Completo</h3>
        <p class="card-desc">30 aulas sobre segurança da informação, phishing e resposta a incidentes.</p>
        <button class="card-action" id="start-training-btn">Começar Treinamento</button>
      </div>
      
      <div class="card">
        <div class="card-icon">📊</div>
        <h3 class="card-title">Meu Progresso</h3>
        <p class="card-desc">Acompanhe seu desempenho e histórico.</p>
        <button class="card-action" onclick="alert('Em breve')">Ver Progresso</button>
      </div>
    </div>
    
    <div class="progress-section">
      <h2 class="section-title">Progresso Geral</h2>
      <div id="progress-list">
        <div class="spinner"></div>
      </div>
    </div>
  </div>

  <!-- Modal Perfil Colaborador -->
  <div class="modal" id="profile-modal">
    <div class="modal-content">
      <button class="modal-close" id="close-profile-modal">&times;</button>
      <h2 class="modal-title">Complete seu Perfil</h2>
      <p class="modal-subtitle">Precisamos desses dados antes de iniciar seu treinamento.</p>
      
      <form id="profile-form">
        <div class="form-group">
          <label class="form-label">E-mail</label>
          <input type="email" class="form-input" id="p-email" readonly>
        </div>
        <div class="form-group">
          <label class="form-label">Nome Completo</label>
          <input type="text" class="form-input" id="p-full_name" required placeholder="Seu nome completo">
        </div>
        <div class="form-group">
          <label class="form-label">Telefone</label>
          <input type="text" class="form-input" id="p-telefone" required placeholder="(00) 00000-0000">
        </div>
        <div class="form-group">
          <label class="form-label">Empresa</label>
          <select class="form-input" id="p-company_id" required>
            <option value="">Selecione sua empresa</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Cargo / Departamento</label>
          <input type="text" class="form-input" id="p-cargo" required placeholder="Ex: Analista de RH">
        </div>
        <div class="form-group">
          <label class="form-label">Data de Início na Empresa</label>
          <input type="date" class="form-input" id="p-data_inicio" required>
        </div>
        
        <div class="modal-actions">
          <button type="submit" class="btn card-action btn-full">Salvar e Iniciar Treinamento</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module">
    import { supabase } from '../js/config/supabase.js'
    import { initNavbar } from '../js/modules/navbar.js'

    const db = supabase
    let currentUser = null
    let userProfile = null

    document.addEventListener('DOMContentLoaded', async () => {
      // Iniciar Navbar dinâmica
      await initNavbar()

      const { data: { user } } = await db.auth.getUser()
      if (!user) { window.location.href = '/src/pages/login.html'; return; }
      currentUser = user

      const { data: profile } = await db.from('profiles').select('*').eq('id', user.id).single()
      userProfile = profile

      await loadProgress(user.id)
      await loadCompanies()

      document.getElementById('start-training-btn').addEventListener('click', () => {
        checkProfileAndStart()
      })

      document.getElementById('profile-form').addEventListener('submit', async (e) => {
        e.preventDefault()
        await saveProfile()
      })

      document.getElementById('close-profile-modal').addEventListener('click', () => {
        document.getElementById('profile-modal').classList.remove('active')
      })
    })

    async function loadCompanies() {
      const { data } = await db.from('empresas').select('id, nome_fantasia').eq('status', 'ativa')
      const select = document.getElementById('p-company_id')
      if (data) {
        data.forEach(c => {
          const opt = document.createElement('option')
          opt.value = c.id
          opt.textContent = c.nome_fantasia
          select.appendChild(opt)
        })
      }
    }

    function checkProfileAndStart() {
      const isComplete = userProfile?.full_name && 
                         userProfile?.company_id && 
                         userProfile?.telefone && 
                         userProfile?.cargo_departamento && 
                         userProfile?.data_inicio_empresa

      if (isComplete) {
        window.location.href = '/src/pages/treinamento.html'
      } else {
        document.getElementById('p-email').value = currentUser.email
        document.getElementById('p-full_name').value = userProfile?.full_name || ''
        document.getElementById('p-telefone').value = userProfile?.telefone || ''
        document.getElementById('p-company_id').value = userProfile?.company_id || ''
        document.getElementById('p-cargo').value = userProfile?.cargo_departamento || ''
        document.getElementById('p-data_inicio').value = userProfile?.data_inicio_empresa || ''
        
        document.getElementById('profile-modal').classList.add('active')
      }
    }

    async function saveProfile() {
      const updates = {
        id: currentUser.id,
        full_name: document.getElementById('p-full_name').value,
        telefone: document.getElementById('p-telefone').value,
        company_id: document.getElementById('p-company_id').value,
        cargo_departamento: document.getElementById('p-cargo').value,
        data_inicio_empresa: document.getElementById('p-data_inicio').value,
        updated_at: new Date().toISOString()
      }

      const { error } = await db.from('profiles').upsert(updates)
      if (error) {
        alert('Erro ao salvar perfil: ' + error.message)
      } else {
        window.location.href = '/src/pages/treinamento.html'
      }
    }

    async function loadProgress(userId) {
      try {
        const { data: courses } = await db.from('courses').select('*').order('order_index')
        const { data: enrollments } = await db.from('enrollments').select('course_id, completed').eq('user_id', userId)

        const list = document.getElementById('progress-list')
        if (!courses || courses.length === 0) {
          list.innerHTML = '<p>Nenhum curso disponível.</p>'
          return
        }

        list.innerHTML = courses.map(course => {
          const isCompleted = enrollments?.find(e => e.course_id === course.id)?.completed || false
          const pct = isCompleted ? 100 : 0
          return `
            <div class="progress-item">
              <span class="progress-item-name">Aula ${course.order_index}: ${course.title}</span>
              <div class="progress-item-bar"><div class="progress-item-fill" style="width: ${pct}%"></div></div>
              <span class="progress-item-percent">${pct}%</span>
            </div>
          `
        }).join('')
      } catch (e) { console.error(e) }
    }
  </script>
</body>
</html>
