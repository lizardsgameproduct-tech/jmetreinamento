<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestão de Empresas — JMR Tecnologia</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #000000;
      --surface-1: #0D0D0D;
      --surface-2: #111827;
      --border: #1F2937;
      --green: #00FF41;
      --text-primary: #F9FAFB;
      --text-secondary: #D1D5DB;
      --text-muted: #9CA3AF;
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }
    html { -webkit-font-smoothing: antialiased; }
    body { 
      font-family: var(--font-body); 
      background: var(--black); 
      color: var(--text-primary); 
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
    .title { font-family: var(--font-display); font-size: 32px; font-weight: 700; }
    .logout-btn { 
      background: var(--green); 
      color: #000; 
      border: none; 
      padding: 10px 20px; 
      border-radius: 6px; 
      cursor: pointer; 
      font-weight: 600;
      transition: all 0.2s;
    }
    .logout-btn:hover { background: #00CC33; }
    .content { 
      background: var(--surface-2); 
      border: 1px solid var(--border); 
      border-radius: 12px; 
      padding: 40px; 
      text-align: center;
      color: var(--text-muted);
    }
    .user-info { margin-top: 20px; font-size: 14px; }
    .badge { 
      display: inline-block; 
      background: var(--green); 
      color: #000; 
      padding: 4px 12px; 
      border-radius: 4px; 
      font-size: 12px; 
      font-weight: 600;
      margin-left: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 class="title">Gestão de Empresas <span class="badge">Admin</span></h1>
      <button class="logout-btn" id="logout-btn">Sair</button>
    </div>
    
    <div class="content">
      <p>Painel de administração — Gestão de empresas e usuários</p>
      <p style="margin-top: 20px; font-size: 13px; color: var(--text-muted);">As empresas cadastradas aparecerão aqui.</p>
      <div class="user-info" id="user-info"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://qpmglhxlnbdzozrtffmf.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwbWdsaHhsbmJkem96cnRmZm1mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1ODAyOTEsImV4cCI6MjA5MzE1NjI5MX0.LxZ-w8fkYv3wLcCyyxp8nft9uh1YI9kaV12mzUjh8YA'
    const { createClient } = supabase
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    document.addEventListener('DOMContentLoaded', async () => {
      // Verificar autenticação
      const { data: { user } } = await db.auth.getUser()
      if (!user) {
        window.location.href = '/src/pages/login.html'
        return
      }

      // Verificar role de admin
      const { data: profile } = await db
        .from('profiles')
        .select('role')
        .eq('id', user.id)
        .single()

      if (profile?.role !== 'admin') {
        window.location.href = '/src/pages/meus-cursos.html'
        return
      }

      // Exibir informações do usuário
      document.getElementById('user-info').innerHTML = `Logado como: <strong>${user.email}</strong> (Admin)`

      // Logout
      document.getElementById('logout-btn').addEventListener('click', async () => {
        await db.auth.signOut()
        window.location.href = '/src/pages/login.html'
      })
    })
  </script>
</body>
</html>
