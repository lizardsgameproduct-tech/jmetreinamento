<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JMR Tecnologia</title>
  <style>
    body { margin: 0; background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .logo { font-family: sans-serif; font-size: 13px; color: #00FF41; letter-spacing: 0.1em; }
  </style>
</head>
<body>
  <div class="logo">JMR TECNOLOGIA</div>
  <script type="module">
    import { supabase } from './src/js/config/supabase.js'
    import { redirectByRole } from './src/js/auth/session.js'

    const { data: { session } } = await supabase.auth.getSession()

    if (session) {
      const { data: profile } = await supabase
        .from('profiles')
        .select('role')
        .eq('id', session.user.id)
        .single()
      redirectByRole(profile?.role ?? 'colaborador')
    } else {
      window.location.href = '/src/pages/login.html'
    }
  </script>
</body>
</html>
