<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JMR Tecnologia</title>
  <style>
    body { margin: 0; background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .logo { font-family: sans-serif; font-size: 13px; color: #00FF41; letter-spacing: 0.1em; }
    .spinner { width: 20px; height: 20px; border: 2px solid #1f2937; border-top-color: #00FF41; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .wrap { text-align: center; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="spinner"></div>
    <div class="logo">JMR TECNOLOGIA</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL     = 'https://qpmglhxlnbdzozrtffmf.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwbWdsaHhsbmJkem96cnRmZm1mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1ODAyOTEsImV4cCI6MjA5MzE1NjI5MX0.LxZ-w8fkYv3wLcCyyxp8nft9uh1YI9kaV12mzUjh8YA'

    const { createClient } = supabase
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    function redirectByRole(role) {
      const routes = {
        admin:       'src/pages/admin/empresas.html',
        gestor:      'src/pages/dashboard-gestor.html',
        colaborador: 'src/pages/meus-cursos.html'
      }
      window.location.href = routes[role] ?? 'src/pages/meus-cursos.html'
    }

    ;(async () => {
      const { data: { session } } = await db.auth.getSession()
      if (session) {
        const { data: profile } = await db
          .from('profiles')
          .select('role')
          .eq('id', session.user.id)
          .single()
        if (profile) { redirectByRole(profile.role); return }
      }
      window.location.href = 'src/pages/login.html'
    })()
  </script>
</body>
</html>
